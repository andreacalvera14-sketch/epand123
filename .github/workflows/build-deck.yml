name: Build Epsilon Deck
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-pptx
      - run: python build_deck.py
      - uses: actions/upload-artifact@v4
        with:
          name: Epsilon_CSA_Deck
          path: Epsilon_CSA_Deck.pptx
          retention-days: 30
          if-no-files-found: error
      - name: Publish to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-deck
          name: Latest Epsilon CSA Deck
          files: Epsilon_CSA_Deck.pptx
